<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Tomo — Algoritmo</title>
<style>
  :root{--paper:#ECE1C8;--panel:#F4ECDA;--ink:#17140F;--muted:#6B6250;--vermilion:#C8451F;--border:#17140F;--shadow:rgba(23,20,15,.9)}
  @media (prefers-color-scheme:dark){:root{--paper:#151310;--panel:#201C16;--ink:#EFE7D6;--muted:#A99F8B;--vermilion:#E5622F;--border:#3A342A;--shadow:rgba(0,0,0,.6)}}
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background-color:var(--paper);background-image:radial-gradient(var(--border) .6px,transparent .6px);background-size:16px 16px;background-position:-8px -8px;color:var(--ink);font-family:Georgia,"Times New Roman",serif;min-height:100vh}
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{width:100%;max-width:420px;border:2px solid var(--border);background:var(--panel);box-shadow:6px 6px 0 var(--shadow);padding:28px 24px}
  .brand{font-family:Arial,Helvetica,sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:1px;font-size:34px;margin:0 0 4px}
  .brand span{color:var(--vermilion)}
  .sub{color:var(--muted);font-style:italic;margin:0 0 22px;font-size:15px}
  label{display:block;font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  input{width:100%;padding:14px;border:2px solid var(--border);border-radius:0;background:var(--paper);color:var(--ink);font-size:16px;font-family:inherit}
  input:focus{outline:3px solid var(--vermilion);outline-offset:1px}
  button{width:100%;margin-top:14px;padding:14px;border:2px solid var(--border);background:var(--vermilion);color:#fff;font-family:Arial,Helvetica,sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:.8px;font-size:14px;cursor:pointer;box-shadow:3px 3px 0 var(--shadow)}
  button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shadow)}
  .err{color:var(--vermilion);font-family:Arial,Helvetica,sans-serif;font-weight:800;font-size:13px;margin-top:12px;min-height:18px}
  #doc{display:none}
</style>
</head>
<body>
  <div id="gate">
    <div class="box">
      <h1 class="brand"><span>Tomo</span></h1>
      <p class="sub">Documento riservato — inserisci la password per aprirlo.</p>
      <form id="f">
        <label for="pw">Password</label>
        <input id="pw" type="password" autocomplete="off" autofocus spellcheck="false" />
        <button type="submit">Apri il documento</button>
        <div class="err" id="err"></div>
      </form>
    </div>
  </div>
  <div id="doc"></div>

  function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
  async function unlock(pw){
    var enc = new TextEncoder();
    var base = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:b64(ENC.salt), iterations:ENC.iter, hash:"SHA-256"},
      base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    var plainBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(ENC.iv)}, key, b64(ENC.ct));
    return new TextDecoder().decode(plainBuf);
  }
  document.getElementById("f").addEventListener("submit", async function(e){
    e.preventDefault();
    var err = document.getElementById("err"); err.textContent = "";
    var pw = document.getElementById("pw").value;
    try{
      var html = await unlock(pw);
      var doc = document.getElementById("doc");
      doc.innerHTML = html;
      document.getElementById("gate").style.display = "none";
      doc.style.display = "block";
      document.title = "Tomo — Come funziona l'algoritmo";
    }catch(_){
      err.textContent = "Password errata.";
      document.getElementById("pw").value = "";
    }
  });
